<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>優良護理師表揚模板產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">優良護理師<em>表揚系統</em></span>
    </div>
    <nav class="header-nav">
      <a href="admin.html" class="admin-link">管理員後台 →</a>
    </nav>
  </div>
</header>

<!-- Main Layout -->
<main class="app-layout">

  <!-- LEFT PANEL -->
  <aside class="left-panel">

    <!-- Template Selector (top) -->
    <section class="panel-section template-section">
      <h2 class="section-title">選擇模板</h2>
      <div class="template-grid" id="templateGrid">
        <!-- Populated by templates.js -->
      </div>
    </section>

    <!-- Divider -->
    <div class="panel-divider"></div>

    <!-- Content Editor (bottom) -->
    <section class="panel-section editor-section">
      <h2 class="section-title">填寫內容</h2>

      <div class="field-group">
        <label class="field-label" for="unitField">單位／科別</label>
        <input type="text" id="unitField" class="field-input" placeholder="例：內科加護病房" maxlength="30">
      </div>

      <div class="field-group">
        <label class="field-label" for="nameField">護理師姓名</label>
        <input type="text" id="nameField" class="field-input field-input--large" placeholder="例：王小明" maxlength="10">
      </div>

      <div class="field-group">
        <label class="field-label" for="titleField">職稱</label>
        <input type="text" id="titleField" class="field-input" placeholder="例：護理師、副護理長" maxlength="20">
      </div>

      <div class="field-group">
        <label class="field-label" for="deedField">優良事蹟</label>
        <textarea id="deedField" class="field-textarea" placeholder="請描述該護理師的優良事蹟…" rows="4" maxlength="200"></textarea>
        <span class="char-count"><span id="deedCount">0</span>/200</span>
      </div>

      <div class="field-group">
        <label class="field-label" for="dateField">表揚日期</label>
        <input type="date" id="dateField" class="field-input">
      </div>

      <!-- Photo Upload -->
      <div class="field-group">
        <label class="field-label">上傳相片</label>
        <div class="photo-drop" id="photoDrop">
          <input type="file" id="photoInput" accept="image/*" hidden>
          <div class="photo-drop-inner" id="photoDropInner">
            <span class="photo-icon">⊕</span>
            <span class="photo-hint">點擊或拖曳照片至此</span>
            <span class="photo-sub">支援 JPG、PNG（建議正方形）</span>
          </div>
          <img id="photoPreviewThumb" class="photo-thumb" hidden>
          <button class="photo-remove" id="photoRemove" hidden>✕ 移除</button>
        </div>
      </div>

      <!-- Actions -->
      <div class="action-bar">
        <button class="btn btn--primary" id="btnDownload">
          <span>↓</span> 下載 PNG
        </button>
        <button class="btn btn--outline" id="btnUpload">
          <span>↑</span> 上傳 Google Drive
        </button>
      </div>

      <p class="upload-status" id="uploadStatus"></p>
    </section>

  </aside>

  <!-- RIGHT PANEL: Preview -->
  <section class="preview-panel">
    <div class="preview-header">
      <span class="preview-label">即時預覽</span>
      <span class="preview-ratio">16 : 9</span>
    </div>
    <div class="preview-wrap" id="previewWrap">
      <canvas id="previewCanvas"></canvas>
      <div class="preview-placeholder" id="previewPlaceholder">
        <span class="placeholder-icon">◈</span>
        <p>請選擇模板並填寫內容</p>
      </div>
    </div>
  </section>

</main>

<!-- Photo Crop Modal -->
<div class="modal-overlay" id="cropModal" hidden>
  <div class="modal-box">
    <h3 class="modal-title">裁切相片</h3>
    <div class="crop-area" id="cropArea">
      <img id="cropImg" src="" alt="裁切">
      <div class="crop-mask" id="cropMask"></div>
    </div>
    <div class="crop-controls">
      <label>縮放
        <input type="range" id="cropZoom" min="50" max="200" value="100">
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn btn--outline" id="cropCancel">取消</button>
      <button class="btn btn--primary" id="cropConfirm">確認裁切</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/templates.js"></script>
<script src="js/canvas.js"></script>
<script src="js/gdrive.js"></script>
<script src="js/app.js"></script>
</body>
</html>
